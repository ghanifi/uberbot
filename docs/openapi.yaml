openapi: 3.0.0
info:
  title: Airlinel Transfer API
  description: API for vehicle search, reservation management, and booking details retrieval for airport transfer services
  version: 1.0.0
  contact:
    name: Airlinel Support
    email: support@airlinel.com
    url: https://airlinel.com
  license:
    name: Proprietary
    url: https://airlinel.com/license
servers:
  - url: /wp-json/airlinel/v1
    description: Airlinel Transfer API v1
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key required for all endpoints. Obtain from Settings Manager admin panel.
  schemas:
    SearchRequest:
      type: object
      required:
        - pickup
        - dropoff
        - date
      properties:
        pickup:
          type: string
          description: Pickup location (address or postcode)
          example: London Heathrow Terminal 3
        dropoff:
          type: string
          description: Dropoff location (address or postcode)
          example: Central London, W1A 1AA
        date:
          type: string
          format: date
          description: Transfer date in YYYY-MM-DD format
          example: "2026-05-15"
        passengers:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: Number of passengers
        currency:
          type: string
          enum:
            - GBP
            - EUR
            - TRY
            - USD
          default: GBP
          description: Currency for pricing
        country:
          type: string
          enum:
            - UK
            - TR
          default: UK
          description: Country code for pricing zones
    SearchResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        distance_km:
          type: number
          format: float
          description: Distance between pickup and dropoff in kilometers
          example: 25.5
        base_price_gbp:
          type: number
          format: float
          description: Base price before passenger multiplier in GBP
          example: 35.0
        passengers:
          type: integer
          example: 2
        multiplier:
          type: number
          format: float
          description: Price multiplier based on passenger count
          example: 1.5
        total_gbp:
          type: number
          format: float
          description: Total price in GBP before currency conversion
          example: 52.5
        currency:
          type: string
          example: GBP
        rate:
          type: number
          format: float
          description: Exchange rate applied
          example: 1.18
        total_display:
          type: number
          format: float
          description: Final price in requested currency
          example: 61.95
    ReservationRequest:
      type: object
      required:
        - customer_name
        - email
        - phone
        - pickup_location
        - dropoff_location
        - transfer_date
        - total_price
      properties:
        customer_name:
          type: string
          description: Full name of the customer
          example: John Smith
        email:
          type: string
          format: email
          description: Customer email address
          example: john.smith@example.com
        phone:
          type: string
          description: Customer phone number
          example: "+44 20 7946 0958"
        pickup_location:
          type: string
          description: Pickup location
          example: London Heathrow Terminal 3
        dropoff_location:
          type: string
          description: Dropoff location
          example: Central London, W1A 1AA
        transfer_date:
          type: string
          format: date
          description: Date of transfer in YYYY-MM-DD format (must be future date)
          example: "2026-05-15"
        passengers:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: Number of passengers
        currency:
          type: string
          enum:
            - GBP
            - EUR
            - TRY
            - USD
          default: GBP
          description: Currency of the reservation
        country:
          type: string
          enum:
            - UK
            - TR
          default: UK
          description: Country code
        total_price:
          type: number
          format: float
          description: Total price for the reservation
          example: 55.0
        agency_code:
          type: string
          description: Optional agency code for commission tracking
          example: AGENCY123
        commission_type:
          type: string
          enum:
            - included
            - additional
          default: included
          description: How commission is calculated (only used if agency_code provided)
    ReservationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        reservation_id:
          type: integer
          description: Unique reservation ID (WordPress post ID)
          example: 456
    ReservationDetail:
      type: object
      properties:
        id:
          type: integer
          description: Reservation ID
          example: 456
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - cancelled
          description: Current reservation status
          example: pending
        customer_name:
          type: string
          example: John Smith
        email:
          type: string
          format: email
          example: john.smith@example.com
        phone:
          type: string
          example: "+44 20 7946 0958"
        pickup:
          type: string
          description: Pickup location
          example: London Heathrow Terminal 3
        dropoff:
          type: string
          description: Dropoff location
          example: Central London, W1A 1AA
        date:
          type: string
          format: date
          description: Transfer date
          example: "2026-05-15"
        passengers:
          type: integer
          example: 2
        total_price:
          type: number
          format: float
          example: 55.0
        currency:
          type: string
          example: GBP
        country:
          type: string
          example: UK
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error code identifier
          example: missing_params
        message:
          type: string
          description: Human-readable error message
          example: Missing required parameters
        data:
          type: object
          description: Additional error details
          properties:
            status:
              type: integer
              example: 400
security:
  - ApiKeyAuth: []
paths:
  /search:
    post:
      summary: Search for available vehicles
      description: Search for available vehicles with pricing information for a given route. Returns pricing in the requested currency with distance and rate multiplier details.
      operationId: searchTransfers
      tags:
        - Search
      requestBody:
        description: Search parameters
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
            examples:
              basicSearch:
                summary: Basic search with required parameters
                value:
                  pickup: London Heathrow Terminal 3
                  dropoff: Central London, W1A 1AA
                  date: "2026-05-15"
              detailedSearch:
                summary: Search with all optional parameters
                value:
                  pickup: London Heathrow Terminal 3
                  dropoff: Central London, W1A 1AA
                  date: "2026-05-15"
                  passengers: 3
                  currency: EUR
                  country: UK
      responses:
        "200":
          description: Successful vehicle search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                success: true
                distance_km: 25.5
                base_price_gbp: 35.0
                passengers: 2
                multiplier: 1.5
                total_gbp: 52.5
                currency: EUR
                rate: 1.18
                total_display: 61.95
        "400":
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingParams:
                  summary: Missing required parameters
                  value:
                    code: missing_params
                    message: Missing required parameters
                    data:
                      status: 400
        "401":
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: rest_forbidden
                message: Invalid API key
        "503":
          description: Service unavailable - pricing engine not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: pricing_engine_not_available
                message: Pricing engine not yet initialized
  /reservation/create:
    post:
      summary: Create a new reservation
      description: Create a new booking reservation with customer details and pricing information. Returns reservation ID for tracking.
      operationId: createReservation
      tags:
        - Reservations
      requestBody:
        description: Reservation details
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationRequest"
            examples:
              basicReservation:
                summary: Basic reservation with required fields
                value:
                  customer_name: John Smith
                  email: john.smith@example.com
                  phone: "+44 20 7946 0958"
                  pickup_location: London Heathrow Terminal 3
                  dropoff_location: Central London, W1A 1AA
                  transfer_date: "2026-05-15"
                  total_price: 55.0
              detailedReservation:
                summary: Reservation with all optional fields
                value:
                  customer_name: John Smith
                  email: john.smith@example.com
                  phone: "+44 20 7946 0958"
                  pickup_location: London Heathrow Terminal 3
                  dropoff_location: Central London, W1A 1AA
                  transfer_date: "2026-05-15"
                  passengers: 2
                  currency: GBP
                  country: UK
                  total_price: 55.0
                  agency_code: AGENCY123
                  commission_type: included
      responses:
        "200":
          description: Reservation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
              example:
                success: true
                reservation_id: 456
        "400":
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingField:
                  summary: Missing required field
                  value:
                    code: validation
                    message: "Missing: customer_name"
                    data:
                      status: 400
                invalidEmail:
                  summary: Invalid email format
                  value:
                    code: validation
                    message: Invalid email address provided
                    data:
                      status: 400
                invalidDate:
                  summary: Invalid or past transfer date
                  value:
                    code: validation
                    message: transfer_date cannot be in the past
                    data:
                      status: 400
                invalidPassengers:
                  summary: Invalid passenger count
                  value:
                    code: validation
                    message: Passengers must be between 1 and 8
                    data:
                      status: 400
        "401":
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /reservation/{id}:
    get:
      summary: Get reservation details
      description: Retrieve full details of a specific reservation by ID. Includes customer information, transfer details, and pricing.
      operationId: getReservation
      tags:
        - Reservations
      parameters:
        - name: id
          in: path
          description: Reservation ID (WordPress post ID)
          required: true
          schema:
            type: integer
          example: 456
      responses:
        "200":
          description: Reservation details retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
              example:
                id: 456
                status: pending
                customer_name: John Smith
                email: john.smith@example.com
                phone: "+44 20 7946 0958"
                pickup: London Heathrow Terminal 3
                dropoff: Central London, W1A 1AA
                date: "2026-05-15"
                passengers: 2
                total_price: 55.0
                currency: GBP
                country: UK
        "401":
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: not_found
                message: Reservation not found
tags:
  - name: Search
    description: Vehicle search and pricing endpoints
  - name: Reservations
    description: Reservation creation and retrieval endpoints
